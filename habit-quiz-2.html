document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Schibsted Grotesk';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"ef262527-de9f-457c-8f2e-cc08c71446b7\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<script src=\"fc7a0a34-b17f-421e-85d5-72d55ae52729\"><\u002Fscript>\n<script src=\"770c24d5-b9d4-4d8c-a002-f80ecd7dc3d5\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0}\n  /* plain, calm background — the whiteboard texture & motion only appear in-game */\n  body{background:#faf7f0;-webkit-font-smoothing:antialiased}\n  @keyframes hl-rise{from{transform:translateY(16px)}to{transform:translateY(0)}}\n  @keyframes hl-pop{from{transform:scale(.94)}to{transform:scale(1)}}\n  @keyframes hl-spin{to{transform:rotate(360deg)}}\n  @keyframes hl-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}\n  @keyframes hl-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}\n  @keyframes hl-grow{from{transform:scaleY(.2)}to{transform:scaleY(1)}}\n  @keyframes hl-draw{to{stroke-dashoffset:0}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 18px;font-family:'Schibsted Grotesk',system-ui,sans-serif;color:#241f17\">\n\n<!-- ============ PLAYER (phone) MODE ============ -->\n<sc-if value=\"{{ isPlayer }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"width:100%;max-width:440px;animation:hl-rise .4s ease\">\n    <div style=\"text-align:center;font-family:'Caveat',cursive;font-size:34px;font-weight:700;color:#e8552d;line-height:1\">Habit Loop · Live<\u002Fdiv>\n\n    <sc-if value=\"{{ p_blocked }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:20px;background:#fff;border:2.5px solid #241f17;border-radius:255px 14px 225px 14px/14px 225px 14px 255px;padding:22px\">\n        <div style=\"font-size:16px;line-height:1.5;color:#3f3a2e\">{{ p_blockedMsg }}<\u002Fdiv>\n        <button onclick=\"{{ reload }}\" style=\"margin-top:16px;width:100%;font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:18px;color:#fff;background:#e8552d;border:none;border-radius:12px;padding:15px;cursor:pointer\">↻ Try again<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ p_naming }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:22px;background:#fff;border:2.5px solid #241f17;border-radius:255px 14px 225px 14px/14px 225px 14px 255px;padding:24px;box-shadow:5px 6px 0 rgba(36,31,23,.12)\">\n        <div style=\"font-family:'Caveat',cursive;font-size:24px;color:#6b6149\">What should we call you?<\u002Fdiv>\n        <input value=\"{{ joinName }}\" oninput=\"{{ onName }}\" placeholder=\"Your name\" maxlength=\"14\" style=\"margin-top:10px;width:100%;font-family:'Schibsted Grotesk',sans-serif;font-size:20px;font-weight:600;padding:14px 16px;border:2px solid #d9d0bb;border-radius:12px;outline:none\">\n        <button onclick=\"{{ onJoin }}\" style=\"{{ joinBtnStyle }}\">{{ joinBtnLabel }}<\u002Fbutton>\n        <div style=\"margin-top:10px;text-align:center;font-size:13px;color:#9a8f76\">{{ p_status }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ p_waiting }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:26px;text-align:center;background:#fff;border:2.5px solid #241f17;border-radius:255px 14px 225px 14px/14px 225px 14px 255px;padding:30px 22px\">\n        <div style=\"font-size:46px\">✋<\u002Fdiv>\n        <div style=\"font-family:'Caveat',cursive;font-size:30px;font-weight:700;margin-top:6px\">You're in, {{ p_name }}!<\u002Fdiv>\n        <div style=\"color:#6b6149;margin-top:4px\">Look up at the shared screen.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ p_answering }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:18px\">\n        <div style=\"text-align:center;font-weight:700;color:#6b6149;margin-bottom:12px\">{{ p_qmeta }}<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px\">\n          <sc-for list=\"{{ p_tiles }}\" as=\"t\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\"><span style=\"font-size:30px\">{{ t.glyph }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ p_locked }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:26px;text-align:center;background:#fff;border:2.5px solid #241f17;border-radius:255px 14px 225px 14px/14px 225px 14px 255px;padding:30px 22px\">\n        <div style=\"font-size:42px\">{{ p_lockGlyph }}<\u002Fdiv>\n        <div style=\"font-family:'Caveat',cursive;font-size:28px;font-weight:700;margin-top:6px\">Locked in!<\u002Fdiv>\n        <div style=\"color:#6b6149\">Waiting for everyone…<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ p_result }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:22px;text-align:center;background:{{ p_resultBg }};border:2.5px solid #241f17;border-radius:255px 14px 225px 14px/14px 225px 14px 255px;padding:28px 22px;color:#fff;animation:hl-pop .35s ease\">\n        <div style=\"font-size:46px\">{{ p_resultGlyph }}<\u002Fdiv>\n        <div style=\"font-family:'Caveat',cursive;font-size:32px;font-weight:700\">{{ p_resultMsg }}<\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:30px;margin-top:6px\">{{ p_resultPts }}<\u002Fdiv>\n        <div style=\"margin-top:8px;font-weight:600\">{{ p_resultRank }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ HOST (shared screen) MODE ============ -->\n<sc-if value=\"{{ isHost }}\" hint-placeholder-val=\"{{ true }}\">\n\n  <!-- in-game dotted paper texture (hidden on the minimal lobby) -->\n  <sc-if value=\"{{ inGame }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:radial-gradient(#e7e0cf 1.1px, transparent 1.1px);background-size:26px 26px\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- LOBBY — minimal, calm first view -->\n  <sc-if value=\"{{ isLobby }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"width:100%;max-width:540px;text-align:center\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.22em;color:#a99e83;font-weight:600\">THE POWER OF HABIT · CHAPTER ONE<\u002Fdiv>\n      <h1 style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:62px;line-height:.98;letter-spacing:-.02em;margin:14px 0 0\">The Habit Loop Quiz<\u002Fh1>\n      <p style=\"font-size:17px;line-height:1.5;color:#6b6149;max-width:400px;margin:16px auto 0\">A live review game for the whole family. Join on your phones, then play together.<\u002Fp>\n\n      <div style=\"margin-top:26px;background:#fff;border:1px solid #ece4d2;border-radius:18px;padding:22px;box-shadow:0 1px 3px rgba(36,31,23,.06)\">\n        <sc-if value=\"{{ online }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;gap:18px;align-items:center;text-align:left\">\n            <div role=\"img\" aria-label=\"Join QR code\" style=\"{{ qrStyle }}\"><\u002Fdiv>\n            <div>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;color:#a99e83;font-weight:600\">GAME PIN<\u002Fdiv>\n              <div style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:34px;letter-spacing:.06em;line-height:1.1\">{{ code }}<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#9a8f76;margin-top:6px\">Scan the code, or enter the PIN on your phone.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ offline }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-size:14px;line-height:1.55;color:#6b6149;text-align:left\">{{ offlineMsg }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px;min-height:28px\">\n        <sc-for list=\"{{ players }}\" as=\"pl\" hint-placeholder-count=\"0\">\n          <span style=\"{{ pl.chipStyle }}\">{{ pl.name }}<\u002Fspan>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noPlayers }}\" hint-placeholder-val=\"{{ true }}\">\n          <span style=\"font-size:13.5px;color:#b3a98f\">No players yet — scan to join, or add one below.<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px\">\n        <button onclick=\"{{ addMe }}\" style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:600;font-size:14px;color:#6b6149;background:#fff;border:1px solid #e2d9c4;border-radius:10px;padding:9px 16px;cursor:pointer\">+ Practice (you)<\u002Fbutton>\n        <button onclick=\"{{ addBot }}\" style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:600;font-size:14px;color:#6b6149;background:#fff;border:1px solid #e2d9c4;border-radius:10px;padding:9px 16px;cursor:pointer\">+ Demo player<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:24px\">\n        <button onclick=\"{{ startGame }}\" style=\"{{ startStyle }}\">{{ startLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- QUESTION -->\n  <sc-if value=\"{{ isQuestion }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;max-width:980px\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px\">\n        <div style=\"display:flex;align-items:center;gap:12px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#a99e83\">{{ counter }}<\u002Fspan>\n          <span style=\"{{ catStyle }}\">{{ catLabel }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"{{ timerStyle }}\"><span style=\"position:relative;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;color:#241f17\">{{ timerNum }}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div key=\"{{ qkey }}\" style=\"animation:hl-rise .35s ease;display:flex;gap:26px;align-items:flex-start;margin-top:16px\">\n        <sc-if value=\"{{ hasMedia }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"flex:0 0 248px;display:flex;flex-direction:column;gap:12px\">\n            <sc-if value=\"{{ mediaLoop }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #ece4d2;border-radius:16px;padding:14px;display:flex;flex-direction:column;align-items:center;box-shadow:0 1px 3px rgba(36,31,23,.06)\">\n                <svg width=\"200\" height=\"170\" viewBox=\"0 0 150 130\">\n                  <circle cx=\"75\" cy=\"62\" r=\"50\" fill=\"none\" stroke=\"#e7dcc2\" stroke-width=\"2\" stroke-dasharray=\"5 7\" style=\"transform-origin:75px 62px;animation:hl-spin 22s linear infinite\"><\u002Fcircle>\n                  <g style=\"transform-origin:75px 20px;animation:hl-pulse 2.6s ease-in-out infinite\"><circle cx=\"75\" cy=\"20\" r=\"16\" fill=\"#f0b429\"><\u002Fcircle><text x=\"75\" y=\"24\" text-anchor=\"middle\" font-family=\"Caveat\" font-size=\"14\" font-weight=\"700\" fill=\"#241f17\">Cue<\u002Ftext><\u002Fg>\n                  <g style=\"transform-origin:115px 86px;animation:hl-pulse 2.6s ease-in-out .85s infinite\"><circle cx=\"115\" cy=\"86\" r=\"16\" fill=\"#e8552d\"><\u002Fcircle><text x=\"115\" y=\"90\" text-anchor=\"middle\" font-family=\"Caveat\" font-size=\"11\" font-weight=\"700\" fill=\"#fff\">Routine<\u002Ftext><\u002Fg>\n                  <g style=\"transform-origin:35px 86px;animation:hl-pulse 2.6s ease-in-out 1.7s infinite\"><circle cx=\"35\" cy=\"86\" r=\"16\" fill=\"#2f8f5b\"><\u002Fcircle><text x=\"35\" y=\"90\" text-anchor=\"middle\" font-family=\"Caveat\" font-size=\"11\" font-weight=\"700\" fill=\"#fff\">Reward<\u002Ftext><\u002Fg>\n                  <path d=\"M90 30 A40 40 0 0 1 106 68\" fill=\"none\" stroke=\"#c3b594\" stroke-width=\"2.5\" marker-end=\"url(#qah)\"><\u002Fpath>\n                  <path d=\"M99 94 A40 40 0 0 1 51 94\" fill=\"none\" stroke=\"#c3b594\" stroke-width=\"2.5\" marker-end=\"url(#qah)\"><\u002Fpath>\n                  <path d=\"M44 68 A40 40 0 0 1 60 30\" fill=\"none\" stroke=\"#c3b594\" stroke-width=\"2.5\" marker-end=\"url(#qah)\"><\u002Fpath>\n                  <defs><marker id=\"qah\" markerWidth=\"7\" markerHeight=\"7\" refX=\"5\" refY=\"3\" orient=\"auto\"><path d=\"M0 0 L6 3 L0 6 z\" fill=\"#c3b594\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n                <\u002Fsvg>\n                <div style=\"font-family:'Caveat',cursive;font-size:20px;color:#9a8f76;margin-top:2px\">The habit loop<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ mediaSym }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"background:#fff;border:1px solid #ece4d2;border-radius:16px;padding:22px 14px;text-align:center;box-shadow:0 1px 3px rgba(36,31,23,.06)\">\n                <div style=\"font-size:74px;line-height:1;animation:hl-bob 2.8s ease-in-out infinite\">{{ symEmoji }}<\u002Fdiv>\n                <div style=\"font-family:'Caveat',cursive;font-size:22px;color:#6b6149;margin-top:8px\">{{ symCap }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ mediaPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n              <image-slot id=\"{{ photoId }}\" shape=\"rounded\" radius=\"16\" placeholder=\"{{ photoLabel }}\" style=\"width:100%;height:170px;border:1px solid #ece4d2;border-radius:16px;overflow:hidden\"><\u002Fimage-slot>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"flex:1;min-width:0\">\n          <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:32px;line-height:1.16;letter-spacing:-.01em;margin:0 0 6px;text-wrap:pretty\">{{ prompt }}<\u002Fh2>\n          <div style=\"font-family:'Caveat',cursive;font-size:22px;color:#9a8f76;margin-bottom:18px\">{{ answeredLabel }}<\u002Fdiv>\n          <div style=\"{{ tilesGridStyle }}\">\n            <sc-for list=\"{{ tiles }}\" as=\"t\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\">\n                <span style=\"font-size:30px;flex:0 0 auto\">{{ t.glyph }}<\u002Fspan>\n                <span style=\"flex:1;text-align:left;font-weight:700;font-size:19px\">{{ t.label }}<\u002Fspan>\n                <span style=\"{{ t.pickStyle }}\">{{ t.pickMark }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;justify-content:flex-end;margin-top:20px\">\n        <button onclick=\"{{ revealNow }}\" style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:700;font-size:16px;color:#241f17;background:#fff;border:2.5px solid #241f17;border-radius:12px;padding:13px 24px;cursor:pointer;box-shadow:3px 4px 0 rgba(36,31,23,.14)\">Reveal answer →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- REVEAL -->\n  <sc-if value=\"{{ isReveal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;max-width:980px;animation:hl-rise .35s ease\">\n      <h2 style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:27px;line-height:1.2;margin:0 0 4px\">{{ prompt }}<\u002Fh2>\n      <div style=\"font-family:'Caveat',cursive;font-size:24px;color:{{ revealColor }};margin-bottom:16px\">{{ revealHeadline }}<\u002Fdiv>\n      <div style=\"{{ tilesGridStyle }}\">\n        <sc-for list=\"{{ tiles }}\" as=\"t\" hint-placeholder-count=\"4\">\n          <div style=\"{{ t.style }}\">\n            <span style=\"font-size:28px;flex:0 0 auto\">{{ t.glyph }}<\u002Fspan>\n            <span style=\"flex:1;text-align:left;font-weight:700;font-size:18px\">{{ t.label }}<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px\">{{ t.count }}<\u002Fspan>\n            <span style=\"font-size:22px;width:24px\">{{ t.mark }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:flex-end;margin-top:20px\">\n        <button onclick=\"{{ toBoard }}\" style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:17px;color:#fff;background:#e8552d;border:none;border-radius:12px;padding:14px 28px;cursor:pointer;box-shadow:3px 4px 0 rgba(36,31,23,.18)\">{{ nextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- SCOREBOARD -->\n  <sc-if value=\"{{ isBoard }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;max-width:680px;animation:hl-rise .4s ease\">\n      <div style=\"font-family:'Caveat',cursive;font-size:54px;font-weight:700;text-align:center;line-height:1\">Scoreboard<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:18px\">\n        <sc-for list=\"{{ board }}\" as=\"r\" hint-placeholder-count=\"3\">\n          <div style=\"{{ r.rowStyle }}\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;width:30px;color:#a99e83\">{{ r.rank }}<\u002Fspan>\n            <span style=\"font-size:20px\">{{ r.glyph }}<\u002Fspan>\n            <span style=\"flex:1;font-weight:700;font-size:19px\">{{ r.name }}<\u002Fspan>\n            <sc-if value=\"{{ r.hasGain }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:13px;color:#2f8f5b;background:#e7f5ec;border-radius:999px;padding:3px 9px\">{{ r.gain }}<\u002Fspan><\u002Fsc-if>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;width:74px;text-align:right\">{{ r.score }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:center;margin-top:22px\">\n        <button onclick=\"{{ nextQ }}\" style=\"font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:18px;color:#fff;background:#e8552d;border:none;border-radius:12px;padding:15px 32px;cursor:pointer;box-shadow:3px 4px 0 rgba(36,31,23,.18)\">{{ nextLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- PODIUM -->\n  <sc-if value=\"{{ isPodium }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"width:100%;max-width:760px;text-align:center;animation:hl-rise .4s ease\">\n      <div style=\"font-size:40px;animation:hl-bob 2s ease-in-out infinite\">🏆<\u002Fdiv>\n      <div style=\"font-family:'Caveat',cursive;font-size:56px;font-weight:700;line-height:1\">{{ winnerLine }}<\u002Fdiv>\n      <div style=\"display:flex;align-items:flex-end;justify-content:center;gap:14px;margin-top:26px\">\n        <sc-for list=\"{{ podium }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"display:flex;flex-direction:column;align-items:center;width:160px\">\n            <div style=\"font-size:26px\">{{ p.medal }}<\u002Fdiv>\n            <div style=\"font-size:24px\">{{ p.glyph }}<\u002Fdiv>\n            <div style=\"font-weight:800;font-size:18px;margin:2px 0 6px;text-wrap:balance\">{{ p.name }}<\u002Fdiv>\n            <div style=\"{{ p.barStyle }}\">\n              <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;color:#fff\">{{ p.score }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:7px;margin:24px auto 0;max-width:460px\">\n        <sc-for list=\"{{ rest }}\" as=\"r\" hint-placeholder-count=\"0\">\n          <div style=\"display:flex;align-items:center;gap:12px;background:#fff;border:2px solid #efe7d4;border-radius:12px;padding:10px 16px\">\n            <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700;width:26px;color:#a99e83\">{{ r.rank }}<\u002Fspan>\n            <span style=\"font-size:18px\">{{ r.glyph }}<\u002Fspan>\n            <span style=\"flex:1;text-align:left;font-weight:700\">{{ r.name }}<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace;font-weight:700\">{{ r.score }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <button onclick=\"{{ restart }}\" style=\"margin-top:26px;font-family:'Schibsted Grotesk',sans-serif;font-weight:800;font-size:18px;color:#241f17;background:#f0b429;border:2.5px solid #241f17;border-radius:12px;padding:15px 34px;cursor:pointer;box-shadow:3px 4px 0 rgba(36,31,23,.2)\">Play again ↺<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1040,&quot;height&quot;:720}}\">\nclass Component extends DCLogic {\n  state = {\n    role:'host', phase:'lobby', players:[], qIndex:0, remaining:0, timeLimit:20,\n    online:false, code:null, joinUrl:null, peerErr:null,\n    // player side\n    connected:false, joined:false, joinName:'', me:null,\n  };\n\n  GLYPHS=['▲','◆','●','■'];\n  BGS=['#e8552d','#2a6fdb','#f0b429','#2f8f5b'];\n  BOTNAMES=['Maya','Theo','Ravi','Nora','Iris','Otto','Lena','Cyrus','Juno','Beau','Wren','Hugo'];\n  VIZ={\n    0:{photo:'eugene',plabel:'Drop a vintage portrait'},\n    2:{sym:'🧠',cap:'Basal ganglia — habit HQ'},\n    5:{loop:true},\n    9:{sym:'🧩',cap:'Put it in sequence'},\n    12:{sym:'☕',cap:'Morning routine',photo:'coffee',plabel:'Drop a morning-coffee photo'},\n    16:{sym:'⏰',cap:'Time & place cues'},\n    17:{sym:'📚',cap:'Study loop'},\n    20:{sym:'🚶',cap:'Swap the routine',photo:'walk',plabel:'Drop a walk / tea photo'},\n    22:{sym:'🧠',cap:'Automatic brain'},\n  };\n\n  QUESTIONS=[\n    {t:'quiz',q:'Which name launches the habit story?',o:['Claude Steele','Ivan Pavlov','Daniel Kahneman','Eugene Pauly'],c:3},\n    {t:'tf',q:'Habits need conscious memory to run.',o:['True','False'],c:1},\n    {t:'quiz',q:'What brain area stores habit routines?',o:['Amygdala','Hippocampus','Basal ganglia','Prefrontal cortex'],c:2},\n    {t:'quiz',q:'Which routine fits a home cue?',o:['Unplanned nap','Keys placed in a bowl','Yearly checkup','Random playlist'],c:1},\n    {t:'tf',q:'Chunking lets the brain combine repeated actions into one automatic routine.',o:['True','False'],c:0},\n    {t:'quiz',q:'Which best describes the habit loop?',o:['Plan · Act · Reflect','Cue → Routine → Reward','Trigger → Goal → Effort','Stimulus → Belief → Result'],c:1},\n    {t:'tf',q:'Time of day and location are common habit cues.',o:['True','False'],c:0},\n    {t:'quiz',q:'Which reward most encourages a habit to repeat?',o:['Confusion','Satisfaction','Boredom','Ambivalence'],c:1},\n    {t:'tf',q:'Believing change is possible makes habit change easier.',o:['True','False'],c:0},\n    {t:'quiz',q:\"Eugene's story — what's the correct order?\",o:['Illness → Memory loss → Routine tests → Habits persist','Memory loss → Illness → Habits persist → Routine tests','Routine tests → Illness → Memory loss → Habits persist','Illness → Routine tests → Memory loss → Habits persist'],c:0},\n    {t:'quiz',q:'Which finding surprised researchers about Eugene?',o:['He spoke many languages','He regained chronology','He learned new habits','He recognized strangers'],c:2},\n    {t:'tf',q:'Habits help the brain conserve mental effort.',o:['True','False'],c:0},\n    {t:'quiz',q:'Morning habit loop — what is the correct order?',o:['Make coffee → Alarm → Alert → Drink','Alarm → Make coffee → Drink coffee → Feel alert','Alarm → Drink coffee → Make coffee → Alert','Feel alert → Alarm → Make coffee → Drink'],c:1},\n    {t:'quiz',q:'Which method helps identify the real reward?',o:['Skip all cues','Swap the routine','Record outcomes','Guess once'],c:2},\n    {t:'tf',q:'Easiest change: keep the same cue and reward, change the routine.',o:['True','False'],c:0},\n    {t:'quiz',q:'Habit-redesign steps — correct order?',o:['Swap routine → Track → Identify cue → Guess reward','Identify cue → Guess reward → Swap routine → Track results','Track results → Identify cue → Guess reward → Swap routine','Guess reward → Swap routine → Identify cue → Track'],c:1},\n    {t:'quiz',q:'Which cues are most commonly linked together?',o:['Taste & fortune','Emotion & people','Phase of the moon','Time & location'],c:3},\n    {t:'quiz',q:'Which scenario best demonstrates the habit loop?',o:['Study whenever you feel like it','Set a study time → study → reward yourself','Eat a treat without studying','Snack after homework'],c:1},\n    {t:'tf',q:'Replacing a routine generally beats eliminating a habit outright.',o:['True','False'],c:0},\n    {t:'quiz',q:'Chapter 1 concepts — what flow order makes sense?',o:[\"Eugene's case → Basal ganglia → Habit loop → Experiments\",'Habit loop → Experiments → Eugene → Basal ganglia','Experiments → Habit loop → Basal ganglia → Eugene','Basal ganglia → Experiments → Eugene → Habit loop'],c:0},\n    {t:'quiz',q:'Which routine could best reduce stress snacking?',o:['Skip all meals','Eat more candy','Scroll your phone','Take a walk or drink tea'],c:3},\n    {t:'tf',q:'The basal ganglia are key to automatic behavior and habits.',o:['True','False'],c:0},\n    {t:'poll',q:'Which habit are you most interested in improving?',o:['Morning routine','Homework / studying','Health & exercise','Sleep'],c:-1},\n    {t:'poll',q:'Which tiny habit will you start this week?',o:['Morning focus','After-school routine','Bedtime wind-down','Healthy snack swap'],c:-1},\n  ];\n\n  componentDidMount(){\n    this._timers=[];\n    const j=new URLSearchParams(location.search).get('join');\n    if(j){ this.setState({role:'player'}); this.initPlayer(j.toUpperCase()); }\n    else { this.initHost(); }\n  }\n  componentWillUnmount(){\n    clearInterval(this._tick); (this._timers||[]).forEach(clearTimeout);\n    try{ this._peer&&this._peer.destroy(); }catch(e){}\n  }\n\n  // ---------- helpers ----------\n  genCode(){ const a='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s=''; for(let i=0;i<5;i++) s+=a[Math.floor(Math.random()*a.length)]; return s; }\n  tilesData(q){\n    if(q.t==='tf') return [{bg:'#2f8f5b',glyph:'✓',label:'True'},{bg:'#e8552d',glyph:'✗',label:'False'}];\n    return q.o.map((label,i)=>({bg:this.BGS[i],glyph:this.GLYPHS[i],label}));\n  }\n  glyphFor(p){ return p.glyph; }\n\n  // ---------- HOST: networking ----------\n  initHost(){\n    if(typeof window.Peer==='undefined'){ this.setState({peerErr:'lib'}); return; }\n    this.makePeer();\n  }\n  makePeer(){\n    const code=this.genCode();\n    try{\n      const peer=new window.Peer('hlq-'+code,{debug:0});\n      this._peer=peer;\n      peer.on('open',()=>{\n        const base=location.origin+location.pathname;\n        this.setState({online:true,code,joinUrl:base+'?join='+code});\n      });\n      peer.on('connection',(conn)=>this.onConn(conn));\n      peer.on('error',(e)=>{\n        const m=''+e;\n        if(m.includes('unavailable-id')){ try{peer.destroy();}catch(x){} this.makePeer(); }\n        else if(m.includes('network')||m.includes('server')||m.includes('socket')){ this.setState({peerErr:'net'}); }\n      });\n    }catch(e){ this.setState({peerErr:'net'}); }\n  }\n  onConn(conn){\n    conn.on('data',(d)=>{\n      if(!d||!d.t) return;\n      if(d.t==='join') this.addRemote(conn,d.name);\n      else if(d.t==='answer') this.submitAnswer(conn.peer, d.choice);\n    });\n    conn.on('close',()=>{});\n  }\n  send(conn,msg){ try{ conn&&conn.open&&conn.send(msg); }catch(e){} }\n\n  addRemote(conn,name){\n    const idx=this.state.players.length;\n    const p=this.mkPlayer({id:conn.peer,name:(name||'Player').slice(0,14),idx,conn});\n    this.setState(s=>({players:[...s.players,p]}));\n    this.send(conn,{t:'accepted',name:p.name,glyph:p.glyph,bg:p.bg});\n    this.send(conn,{t:'lobby'});\n  }\n  mkPlayer(o){\n    const i=o.idx;\n    return {id:o.id,name:o.name,glyph:this.GLYPHS[i%4],bg:this.BGS[i%4],\n      score:0,streak:0,answeredIndex:null,answeredAt:null,pendingGain:0,\n      conn:o.conn||null,isYou:!!o.isYou,isBot:!!o.isBot};\n  }\n  addMe(){ if(this.state.players.some(p=>p.isYou)) return; this.setState(s=>({players:[...s.players,this.mkPlayer({id:'you',name:'You',idx:s.players.length,isYou:true})]})); }\n  addBot(){ const used=this.state.players.map(p=>p.name); const pool=this.BOTNAMES.filter(n=>!used.includes(n)); const name=(pool[0]||('Bot'+this.state.players.length)); this.setState(s=>({players:[...s.players,this.mkPlayer({id:'bot'+Date.now()+Math.random(),name,idx:s.players.length,isBot:true})]})); }\n\n  // ---------- HOST: game flow ----------\n  startGame(){ if(this.state.players.length===0) return; this.startQuestion(0); }\n  startQuestion(i){\n    const q=this.QUESTIONS[i]; const tl=q.t==='poll'?15:20;\n    this._endsAt=Date.now()+tl*1000;\n    this.setState(s=>({phase:'question',qIndex:i,timeLimit:tl,remaining:tl,\n      players:s.players.map(p=>({...p,answeredIndex:null,answeredAt:null,pendingGain:0}))}));\n    clearInterval(this._tick);\n    this._tick=setInterval(()=>{\n      const rem=Math.max(0,(this._endsAt-Date.now())/1000);\n      this.setState({remaining:rem});\n      if(rem<=0) this.toReveal();\n      else if(this.allAnswered()) this.toReveal();\n    },200);\n    this.scheduleBots(i,tl);\n    this.broadcast((p)=>({t:'q',n:i+1,total:this.QUESTIONS.length,qt:q.t,tiles:this.tilesData(q).map(x=>({glyph:x.glyph,bg:x.bg}))}));\n  }\n  allAnswered(){ const ps=this.state.players; return ps.length>0 && ps.every(p=>p.answeredIndex!=null); }\n  scheduleBots(i,tl){\n    const q=this.QUESTIONS[i];\n    this.state.players.filter(p=>p.isBot).forEach(bot=>{\n      const delay=(1.2+Math.random()*(tl-3))*1000;\n      const t=setTimeout(()=>{\n        let choice;\n        if(q.t==='poll') choice=Math.floor(Math.random()*q.o.length);\n        else choice = Math.random()<0.62 ? q.c : (()=>{let w;do{w=Math.floor(Math.random()*q.o.length);}while(w===q.c);return w;})();\n        this.submitAnswer(bot.id,choice);\n      },delay);\n      this._timers.push(t);\n    });\n  }\n  submitAnswer(pid,choice){\n    this.setState(s=>{\n      if(s.phase!=='question') return {};\n      const q=this.QUESTIONS[s.qIndex];\n      let changed=false;\n      const players=s.players.map(p=>{\n        if(p.id!==pid||p.answeredIndex!=null) return p;\n        changed=true;\n        const remFrac=Math.max(0,(this._endsAt-Date.now())/(s.timeLimit*1000));\n        let gain=0,streak=p.streak||0;\n        if(q.t!=='poll'){\n          if(choice===q.c){ gain=Math.round(600+400*remFrac); streak+=1; if(streak>=2) gain+=Math.min(streak-1,5)*40; }\n          else streak=0;\n        }\n        if(p.conn) this.send(p.conn,{t:'locked'});\n        return {...p,answeredIndex:choice,answeredAt:Date.now(),pendingGain:gain,streak};\n      });\n      return changed?{players}:{};\n    });\n  }\n  toReveal(){\n    clearInterval(this._tick); (this._timers||[]).forEach(clearTimeout); this._timers=[];\n    this.setState(s=>{\n      const players=s.players.map(p=>({...p,score:(p.score||0)+(p.pendingGain||0)}));\n      const q=this.QUESTIONS[s.qIndex];\n      const ranked=[...players].sort((a,b)=>b.score-a.score);\n      players.forEach(p=>{\n        if(!p.conn) return;\n        const rank=ranked.findIndex(x=>x.id===p.id)+1;\n        const correct=q.t==='poll'?null:(p.answeredIndex===q.c);\n        this.send(p.conn,{t:'reveal',correct,gain:p.pendingGain,score:p.score,rank,total:players.length,poll:q.t==='poll'});\n      });\n      return {phase:'reveal',players};\n    });\n  }\n  toBoard(){\n    this.setState({phase:'scoreboard'});\n    const ranked=[...this.state.players].sort((a,b)=>b.score-a.score);\n    this.state.players.forEach(p=>{ if(p.conn){ const rank=ranked.findIndex(x=>x.id===p.id)+1; this.send(p.conn,{t:'board',rank,score:p.score,total:ranked.length,final:false}); }});\n  }\n  nextQ(){ const n=this.state.qIndex+1; if(n<this.QUESTIONS.length) this.startQuestion(n); else this.toPodium(); }\n  toPodium(){\n    this.setState({phase:'podium'});\n    const ranked=[...this.state.players].sort((a,b)=>b.score-a.score);\n    this.state.players.forEach(p=>{ if(p.conn){ const rank=ranked.findIndex(x=>x.id===p.id)+1; this.send(p.conn,{t:'board',rank,score:p.score,total:ranked.length,final:true}); }});\n  }\n  restart(){\n    clearInterval(this._tick); (this._timers||[]).forEach(clearTimeout); this._timers=[];\n    this.setState(s=>({phase:'lobby',qIndex:0,players:s.players.map(p=>({...p,score:0,streak:0,answeredIndex:null,pendingGain:0}))}));\n    this.state.players.forEach(p=>{ if(p.conn) this.send(p.conn,{t:'lobby'}); });\n  }\n  broadcast(fn){ this.state.players.forEach(p=>{ if(p.conn) this.send(p.conn,fn(p)); }); }\n\n  // ---------- PLAYER (phone) ----------\n  initPlayer(code){\n    if(typeof window.Peer==='undefined'){ this.setState({peerErr:'lib'}); return; }\n    this._code=code; this._tries=0; this._connectedHost=false;\n    this.makePlayerPeer();\n  }\n  makePlayerPeer(){\n    try{\n      const peer=new window.Peer({debug:0}); this._peer=peer;\n      peer.on('open',()=>{ this.dialHost(); });\n      peer.on('error',(e)=>{\n        const m=(''+(e&&e.type||e)).toLowerCase();\n        if(m.includes('peer-unavailable')){ this.retryDial('find'); }      // host id not registered yet / wrong PIN\n        else if(m.includes('browser')||m.includes('webrtc')){ this.setState({peerErr:'browser'}); }\n        else { this.retryDial('net'); }                                     // network/server/socket — retry\n      });\n    }catch(e){ this.setState({peerErr:'net'}); }\n  }\n  dialHost(){\n    try{\n      const conn=this._peer.connect('hlq-'+this._code,{reliable:true}); this._host=conn;\n      conn.on('open',()=>{ this._connectedHost=true; this.setState({connected:true,peerErr:null});\n        const n=(this.state.joinName||'').trim();\n        if(this.state.joinPending && n) this.send(conn,{t:'join',name:n});\n      });\n      conn.on('data',(d)=>this.onHostData(d));\n      conn.on('close',()=>{ if(!this.state.joined) this.retryDial('find'); });\n      conn.on('error',()=>this.retryDial('net'));\n    }catch(e){ this.retryDial('net'); }\n    // if no open within 6s, retry a few times before surfacing an error\n    clearTimeout(this._dialT);\n    this._dialT=setTimeout(()=>{ if(!this._connectedHost) this.retryDial('find'); },6000);\n  }\n  retryDial(kind){\n    if(this._connectedHost) return;\n    this._tries=(this._tries||0)+1;\n    if(this._tries<=5){\n      // rebuild the peer fresh (the cloud broker can drop ids) and try again with backoff\n      try{ this._peer&&this._peer.destroy(); }catch(e){}\n      setTimeout(()=>{ if(!this._connectedHost) this.makePlayerPeer(); }, 700*this._tries);\n    } else {\n      this.setState({peerErr:kind});\n    }\n  }\n  onName(e){ this.setState({joinName:e.target.value}); }\n  onJoin(){\n    const n=(this.state.joinName||'').trim(); if(!n) return;\n    this.setState({joinPending:true});\n    if(this.state.connected && this._host && this._host.open) this.send(this._host,{t:'join',name:n});\n    clearTimeout(this._joinT);\n    this._joinT=setTimeout(()=>{ if(!this.state.joined) this.setState({joinPending:false,peerErr:'find'}); },7000);\n  }\n  onHostData(d){\n    if(!d||!d.t) return;\n    if(d.t==='accepted') this.setState({joined:true,me:{n form:picked?'translateY(-2px)':'none',transition:'opacity .2s, transform .15s'}};\n        });\n      } else {\n        const counts=td.map((_,i)=>s.players.filter(p=>p.answeredIndex===i).length);\n        const isPoll=q.t==='poll';\n        vals.revealColor=isPoll?'#e8552d':'#2f8f5b';\n        vals.revealHeadline=isPoll?'Where everyone landed':'Correct answer';\n        vals.tiles=td.map((t,i)=>{\n          const right=!isPoll&&i===q.c;\n          const dim=!isPoll&&!right;\n          return {glyph:t.glyph,label:t.label,count:counts[i],\n            mark: isPoll?'':(right?'✓':''),\n            style:{display:'flex',alignItems:'center',gap:'14px',padding:'18px 20px',borderRadius:'14px',\n              background:t.bg,color:'#fff',border:'3px solid #241f17',opacity:dim?.4:1,\n              transform:right?'scale(1.015)':'none',\n              boxShadow: right?'0 0 0 3px #2f8f5b, 5px 6px 0 rgba(36,31,23,.2)':'4px 5px 0 rgba(36,31,23,.16)',\n              transition:'opacity .25s'}};\n        });\n      }\n    }\n\n    if(s.phase==='scoreboard'){\n      const ranked=[...s.players].sort((a,b)=>b.score-a.score);\n      vals.board=ranked.map((p,i)=>({rank:i+1,glyph:p.glyph,name:p.name+(p.isYou?' (you)':''),score:p.score,\n        hasGain:p.pendingGain>0, gain:'+'+p.pendingGain,\n        rowStyle:{display:'flex',alignItems:'center',gap:'13px',background:i===0?'#fff7e6':'#fff',\n          border:'2.5px solid '+(i===0?'#f0b429':'#efe7d4'),borderRadius:'14px',padding:'13px 18px',\n          boxShadow:i===0?'4px 5px 0 rgba(240,180,41,.3)':'none',animation:'hl-rise .35s ease '+(i*0.05)+'s both'}}));\n      vals.nextLabel = s.qIndex>=this.QUESTIONS.length-1 ? 'Final results →' : 'Next question →';\n    }\n\n    if(s.phase==='podium'){\n      const ranked=[...s.players].sort((a,b)=>b.score-a.score);\n      vals.winnerLine = ranked.length ? (ranked[0].name==='You' ? '🎉 You win!' : '🎉 '+ranked[0].name+' wins!') : 'Game over';\n      // Explicit slots, left→right = 2nd · 1st · 3rd. Each carries its finishing RANK (1/2/3).\n      const slots=[{p:ranked[1],r:2},{p:ranked[0],r:1},{p:ranked[2],r:3}];\n      const H={1:172,2:122,3:92}, M={1:'🥇',2:'🥈',3:'🥉'}, BG={1:'#f0b429',2:'#9fb0c4',3:'#cf9b6b'};\n      vals.podium = slots.filter(x=>x.p).map((x,slot)=>({\n        name:x.p.name+(x.p.isYou?' (you)':''), glyph:x.p.glyph, medal:M[x.r], score:x.p.score,\n        barStyle:{width:'100%',height:H[x.r]+'px',background:BG[x.r],border:'3px solid #241f17',\n          borderRadius:'12px 12px 0 0',display:'flex',alignItems:'flex-start',justifyContent:'center',paddingTop:'12px',\n          transformOrigin:'bottom',animation:'hl-grow .5s cubic-bezier(.2,.8,.3,1) '+(slot*0.22)+'s both',\n          boxShadow:'4px 0 0 rgba(36,31,23,.12)'}}));\n      vals.rest = ranked.slice(3).map((p,i)=>({rank:i+4,glyph:p.glyph,name:p.name+(p.isYou?' (you)':''),score:p.score}));\n    }\n\n    return vals;\n  }\n\n  playerVals(){\n    const s=this.state, me=s.me;\n    const v={};\n    if(s.peerErr){\n      v.p_blocked=true;\n      v.p_blockedMsg = s.peerErr==='lib' ? 'This game needs to be opened from its hosted web address to join from a phone.'\n        : s.peerErr==='browser' ? 'This phone’s browser is blocking the live connection. Try the latest Chrome or Safari, off any restrictive network.'\n        : s.peerErr==='find' ? 'Couldn’t reach that game. Check the PIN is right and the host screen is on the lobby, then tap reload. (Connecting can take a few seconds on the first try.)'\n        : 'Connection unavailable — the free game broker may be busy. Make sure you’re online, then reload to try again.';\n      return v;\n    }\n    if(!s.joined){\n      v.p_naming=true;\n      v.p_status = s.joinPending ? 'Joining…' : (s.connected?'Connected — pick a name!':'Connecting to the game…');\n      const hasName=!!(s.joinName||'').trim();\n      v.joinBtnLabel = s.joinPending ? 'Joining…' : 'Join the game →';\n      v.joinBtnStyle = {marginTop:'14px',width:'100%',fontFamily:\"'Schibsted Grotesk',sans-serif\",fontWeight:800,fontSize:'19px',color:'#fff',\n        background: (hasName&&!s.joinPending) ? '#e8552d' : '#cbbfa6',\n        border:'none',borderRadius:'12px',padding:'16px',cursor:(hasName&&!s.joinPending)?'pointer':'default',\n        boxShadow:(hasName&&!s.joinPending)?'3px 4px 0 rgba(36,31,23,.18)':'none'};\n      return v;\n    }\n    const ph=me&&me.phase;\n    if(ph==='waiting'||!ph){ v.p_waiting=true; v.p_name=me.name; return v; }\n    if(ph==='answer'){\n      v.p_answering=true; v.p_qmeta='Question '+me.qn+' of '+me.qtotal+' — tap your answer';\n      v.p_tiles=(me.tiles||[]).map((t,i)=>({glyph:t.glyph,onClick:()=>this.playerPick(i),\n        style:{background:t.bg,color:'#fff',border:'3px solid #241f17',borderRadius:'16px',padding:'34px 0',\n          cursor:'pointer',boxShadow:'4px 5px 0 rgba(36,31,23,.18)'}}));\n      return v;\n    }\n    if(ph==='locked'){ v.p_locked=true; v.p_lockGlyph='🔒'; return v; }\n    if(ph==='reveal'){\n      v.p_result=true;\n      if(me.poll){ v.p_resultBg='#2a6fdb'; v.p_resultGlyph='📊'; v.p_resultMsg='Vote counted!'; v.p_resultPts=''; v.p_resultRank='Rank '+me.rank+' of '+me.total; }\n      else { const ok=me.correct; v.p_resultBg=ok?'#2f8f5b':'#c8372a'; v.p_resultGlyph=ok?'✓':'✗';\n        v.p_resultMsg=ok?'Correct!':'Not this time'; v.p_resultPts=(me.gain>0?'+'+me.gain:'0')+' pts'; v.p_resultRank='Rank '+me.rank+' of '+me.total; }\n      return v;\n    }\n    if(ph==='board'||ph==='final'){\n      v.p_result=true; v.p_resultBg=me.rank===1?'#f0b429':'#241f17';\n      v.p_resultGlyph=ph==='final'?(me.rank===1?'🏆':'🎉'):'📊';\n      v.p_resultMsg=ph==='final'?(me.rank===1?'You won!':'Good game!'):'Standing';\n      v.p_resultPts=me.score+' pts'; v.p_resultRank='Rank '+me.rank+' of '+me.total;\n      return v;\n    }\n    v.p_waiting=true; v.p_name=me?me.name:''; return v;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
